[profile.default]
src = "src"
out = "out"
test = "test"
libs = ["lib"]
solc = "0.8.24"
optimizer = true
optimizer_runs = 200

# RPC endpoints for direct `forge script` / `cast` use. The app itself deploys
# via viem against the active network; these mirror packages/monad-core/networks.
[rpc_endpoints]
local = "http://127.0.0.1:8545"
testnet = "https://testnet-rpc.monad.xyz"
